<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Access | Adepa Market</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'stone-charcoal': '#1c1917',
            'kente-gold': '#e29c1d',
            'kente-gold-dark': '#b8860b',
            'terracotta': '#c84e27',
            'warm-cream': '#faf9f5',
            'warm-sand': '#f5ece1',
            'warm-border': '#eae3d9',
            'primary-indigo': '#1a153b',
            'primary-indigo-light': '#2f2563'
          },
          fontFamily: {
            display: ['Playfair Display', 'Georgia', 'serif'],
            sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui']
          }
        }
      }
    }
  </script>

  <style type="text/css">
    body {
      background-color: #faf9f5;
      color: #1c1917;
    }
    .kente-pattern-soft {
      background-color: #e29c1d;
      background-image: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        #c84e27 10px,
        #c84e27 20px,
        #1a153b 20px,
        #1a153b 30px
      );
      opacity: 0.04;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

  <!-- Navbar Shell Container -->
  <div id="adepa-navbar-container"></div>

  <!-- Main Body Content -->
  <main class="flex-1 flex items-center justify-center py-16 px-4 relative">
    <div class="absolute inset-0 kente-pattern-soft pointer-events-none"></div>
    
    <div class="max-w-sm w-full bg-white rounded-xl border border-warm-border p-6 sm:p-8 space-y-5 relative z-10 shadow-sm">
      
      <!-- Heading -->
      <div class="text-center space-y-1.5">
        <span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded text-[9px] font-bold bg-[#F5ECE1] border border-warm-border text-stone-600 uppercase tracking-wider">
          <svg class="h-2.5 w-2.5 text-kente-gold" fill="currentColor" viewBox="0 0 20 20">
            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
          </svg>
          <span>Customer Access</span>
        </span>
        <h2 id="auth-title" class="font-display font-black text-xl text-stone-900">Sign In</h2>
        <p id="auth-subtitle" class="text-[10px] text-stone-400">Manage artisan orders and speed up checkout.</p>
      </div>

      <!-- Error Message Box -->
      <div id="auth-error-box" class="hidden bg-red-50 border border-red-100 text-red-700 text-[10px] p-2.5 rounded font-medium"></div>

      <!-- Form -->
      <form id="auth-form" class="space-y-3.5">
        <!-- Name field (shown during signup) -->
        <div id="auth-name-container" class="hidden space-y-1">
          <label class="text-[10px] font-bold text-stone-400 uppercase">Your Name</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-stone-400">
              <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </span>
            <input
              id="auth-name-input"
              type="text"
              placeholder="Enter name"
              class="w-full bg-[#FAF9F5] border border-warm-border rounded-lg pl-9 pr-3.5 py-2 text-xs focus:outline-none focus:bg-white"
            />
          </div>
        </div>

        <div class="space-y-1">
          <label class="text-[10px] font-bold text-stone-400 uppercase">Email Address</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-stone-400">
              <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
              </svg>
            </span>
            <input
              id="auth-email-input"
              type="email"
              required
              placeholder="name@domain.com"
              class="w-full bg-[#FAF9F5] border border-warm-border rounded-lg pl-9 pr-3.5 py-2 text-xs focus:outline-none focus:bg-white"
            />
          </div>
        </div>

        <div class="space-y-1">
          <label class="text-[10px] font-bold text-stone-400 uppercase">Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-stone-400">
              <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </span>
            <input
              id="auth-password-input"
              type="password"
              required
              placeholder="••••••••"
              class="w-full bg-[#FAF9F5] border border-warm-border rounded-lg pl-9 pr-3.5 py-2 text-xs focus:outline-none focus:bg-white"
            />
          </div>
        </div>

        <button
          type="submit"
          id="auth-submit-btn"
          class="w-full bg-stone-charcoal hover:bg-stone-800 text-white py-2 rounded font-bold text-xs shadow transition-colors flex items-center justify-center gap-1"
        >
          <span id="auth-btn-label">Login</span>
          <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
          </svg>
        </button>
      </form>

      <!-- Toggle Mode Link -->
      <div class="text-center pt-1.5 border-t border-stone-100">
        <button
          id="auth-toggle-mode-btn"
          class="text-[10px] text-stone-500 hover:underline font-bold"
        >
          Need an account? Register
        </button>
      </div>

      <!-- Guest Checkout option -->
      <div class="flex flex-col items-center pt-2">
        <span class="text-[9px] text-stone-400 font-bold uppercase tracking-wider mb-2">Or check out as</span>
        <a
          href="checkout.html"
          class="w-full bg-stone-50 hover:bg-stone-100 text-stone-600 py-1.5 rounded text-[10px] font-bold text-center border border-warm-border"
        >
          Guest Checkout
        </a>
      </div>

    </div>
  </main>

  <!-- Footer Shell Container -->
  <div id="adepa-footer-container"></div>

  <!-- Shared Application Scripts -->
  <script src="js/app.js"></script>

  <!-- Auth View Controller Logic -->
  <script>
    let isLoginMode = true;

    document.addEventListener("DOMContentLoaded", () => {
      const toggleModeBtn = document.getElementById("auth-toggle-mode-btn");
      const nameContainer = document.getElementById("auth-name-container");
      const nameInput = document.getElementById("auth-name-input");
      const title = document.getElementById("auth-title");
      const subtitle = document.getElementById("auth-subtitle");
      const btnLabel = document.getElementById("auth-btn-label");
      const errorBox = document.getElementById("auth-error-box");

      toggleModeBtn.addEventListener("click", () => {
        isLoginMode = !isLoginMode;
        errorBox.classList.add("hidden");

        if (isLoginMode) {
          title.textContent = "Sign In";
          subtitle.textContent = "Manage artisan orders and speed up checkout.";
          btnLabel.textContent = "Login";
          nameContainer.classList.add("hidden");
          nameInput.required = false;
          toggleModeBtn.textContent = "Need an account? Register";
        } else {
          title.textContent = "Register";
          subtitle.textContent = "Sign up to track shipments and save products.";
          btnLabel.textContent = "Sign Up";
          nameContainer.classList.remove("hidden");
          nameInput.required = true;
          toggleModeBtn.textContent = "Have an account? Login";
        }
      });

      // Submit Form Handler
      document.getElementById("auth-form").addEventListener("submit", (e) => {
        e.preventDefault();
        errorBox.classList.add("hidden");

        const email = document.getElementById("auth-email-input").value.trim();
        const password = document.getElementById("auth-password-input").value;
        const name = nameInput.value.trim();

        try {
          if (isLoginMode) {
            AuthManager.login(email, password);
          } else {
            AuthManager.signUp(email, password, name);
          }
          // Redirect home upon success
          window.location.href = "index.html";
        } catch (err) {
          console.error(err);
          errorBox.textContent = `⚠️ ${err.message || "Authentication failed. Try again."}`;
          errorBox.classList.remove("hidden");
        }
      });
    });
  </script>
</body>
</html>
