<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details | Adepa Market</title>
  <meta name="description" content="Explore specific product specifications, user reviews, and pricing for premium Ghanaian artisan goods on Adepa Market.">
  <meta name="keywords" content="Ghanaian crafts, Kente stole, Krobo beads, Shea butter, Bolga basket, African art">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'stone-charcoal': '#1c1917',
            'kente-gold': '#e29c1d',
            'kente-gold-dark': '#b8860b',
            'terracotta': '#c84e27',
            'warm-cream': '#faf9f5',
            'warm-sand': '#f5ece1',
            'warm-border': '#eae3d9',
            'primary-indigo': '#1a153b',
            'primary-indigo-light': '#2f2563'
          },
          fontFamily: {
            display: ['Playfair Display', 'Georgia', 'serif'],
            sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui']
          }
        }
      }
    }
  </script>

  <style type="text/css">
    body {
      background-color: #faf9f5;
      color: #1c1917;
    }
    .kente-pattern-soft {
      background-color: #e29c1d;
      background-image: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        #c84e27 10px,
        #c84e27 20px,
        #1a153b 20px,
        #1a153b 30px
      );
      opacity: 0.04;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #faf9f5;
    }
    ::-webkit-scrollbar-thumb {
      background: #c84e27;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #9f3616;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

  <!-- Navbar Shell Container -->
  <div id="adepa-navbar-container"></div>

  <!-- Main Body Content -->
  <main class="flex-1 mx-auto max-w-7xl w-full px-4 sm:px-6 lg:px-8 py-8">
    
    <!-- Back Button -->
    <button onclick="window.history.back()" class="inline-flex items-center gap-1.5 text-stone-500 hover:text-stone-800 transition-colors mb-6 text-xs font-bold">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      <span>Back to products</span>
    </button>

    <!-- Error State (Product Not Found) -->
    <div id="product-not-found" class="hidden text-center py-20 bg-white border border-warm-border rounded-xl p-6 shadow-sm">
      <h2 class="text-lg font-bold text-stone-850">Product not found</h2>
      <a href="index.html" class="mt-4 inline-block bg-stone-charcoal text-white px-6 py-2 rounded text-xs font-bold">
        Return Home
      </a>
    </div>

    <!-- Product Details Content -->
    <div id="product-details-container" class="hidden">
      <!-- Info Grid -->
      <div class="bg-white rounded-xl border border-warm-border overflow-hidden grid grid-cols-1 md:grid-cols-2 gap-8 p-6 md:p-8 mb-8">
        
        <!-- Image Display -->
        <div class="relative h-80 sm:h-[400px] w-full rounded-lg overflow-hidden bg-stone-50 flex items-center justify-center border border-stone-100">
          <img id="prod-img" src="" alt="" class="absolute inset-0 w-full h-full object-cover" />
          <span id="prod-badge" class="hidden absolute top-4 left-4 text-[9px] font-black uppercase tracking-wider px-2 py-0.5 rounded text-white shadow"></span>
        </div>

        <!-- Product Details Panel -->
        <div class="flex flex-col justify-between">
          <div class="space-y-4">
            <div class="flex items-center gap-2">
              <span id="prod-category" class="bg-[#FAF9F5] text-stone-500 border border-warm-border px-2.5 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider"></span>
              <span id="prod-vendor" class="text-[10px] font-bold text-stone-400"></span>
            </div>

            <h1 id="prod-name" class="font-display font-black text-2xl sm:text-3xl text-stone-900 leading-tight"></h1>

            <!-- Stars -->
            <div class="flex items-center gap-1 text-amber-500">
              <div class="flex" id="prod-stars-container"></div>
              <span id="prod-reviews-count" class="text-[10px] text-stone-400 font-bold mt-0.5"></span>
            </div>

            <!-- Price -->
            <div class="text-xl font-display font-black text-stone-900 flex items-baseline gap-2 pt-1">
              <span id="prod-price-display"></span>
              <span id="prod-promo-display" class="hidden text-xs text-stone-400 line-through font-sans font-normal"></span>
            </div>

            <div class="border-t border-stone-100 pt-4 space-y-1.5">
              <h4 class="text-[10px] font-bold uppercase text-stone-400 tracking-wider">Description</h4>
              <p id="prod-desc" class="text-stone-600 text-xs leading-relaxed"></p>
            </div>
          </div>

          <!-- Actions Form -->
          <div class="border-t border-stone-100 pt-4 mt-6 space-y-4">
            <div class="flex items-center gap-4">
              <span class="text-[10px] font-bold uppercase text-stone-400 tracking-wider">Quantity</span>
              <div class="flex items-center border border-warm-border rounded bg-stone-50 p-0.5">
                <button id="qty-minus" class="w-7 h-7 flex items-center justify-center font-bold text-stone-600 hover:bg-stone-200">-</button>
                <span id="qty-value" class="w-8 text-center font-bold text-xs text-stone-800">1</span>
                <button id="qty-plus" class="w-7 h-7 flex items-center justify-center font-bold text-stone-600 hover:bg-stone-200">+</button>
              </div>
            </div>

            <button id="add-to-cart-btn" class="w-full bg-stone-charcoal hover:bg-stone-800 text-white py-2.5 rounded font-bold text-xs shadow transition-colors flex items-center justify-center gap-2">
              <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
              </svg>
              <span>Add to Shopping Cart</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Customer Reviews Section -->
      <section class="bg-white rounded-xl border border-warm-border p-6 mb-8">
        <h3 class="font-display font-bold text-lg text-stone-900 border-b border-stone-100 pb-3 mb-6">
          Customer Reviews
        </h3>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
          <!-- Write a review -->
          <div class="bg-[#FAF9F5] rounded-xl p-5 border border-warm-border h-fit">
            <h4 class="font-display font-bold text-sm text-stone-855 mb-3">Add Your Review</h4>
            <form id="add-review-form" class="space-y-3">
              <div class="space-y-0.5">
                <label class="text-[10px] font-bold text-stone-400 uppercase">Your Name</label>
                <input
                  id="rev-name-input"
                  type="text"
                  required
                  placeholder="Enter name..."
                  class="w-full bg-white border border-warm-border rounded px-3 py-2 text-xs focus:outline-none"
                />
              </div>

              <div class="space-y-0.5">
                <label class="text-[10px] font-bold text-stone-400 uppercase">Rating</label>
                <select
                  id="rev-rating-input"
                  class="w-full bg-white border border-warm-border rounded px-3 py-2 text-xs focus:outline-none font-semibold text-amber-500"
                >
                  <option value="5">⭐⭐⭐⭐⭐ 5 Stars</option>
                  <option value="4">⭐⭐⭐⭐ 4 Stars</option>
                  <option value="3">⭐⭐⭐ 3 Stars</option>
                  <option value="2">⭐⭐ 2 Stars</option>
                  <option value="1">⭐ 1 Star</option>
                </select>
              </div>

              <div class="space-y-0.5">
                <label class="text-[10px] font-bold text-stone-400 uppercase">Comment</label>
                <textarea
                  id="rev-comment-input"
                  required
                  rows="3"
                  placeholder="Write comment..."
                  class="w-full bg-white border border-warm-border rounded px-3 py-2 text-xs focus:outline-none"
                ></textarea>
              </div>

              <button
                type="submit"
                class="w-full bg-stone-charcoal hover:bg-stone-800 text-white py-2 rounded text-xs font-bold shadow transition-colors"
              >
                Submit
              </button>
            </form>
          </div>

          <!-- List Reviews -->
          <div class="lg:col-span-2 space-y-4" id="reviews-list-container"></div>
        </div>
      </section>

      <!-- Recommendations -->
      <section class="space-y-4">
        <h3 class="text-sm font-bold uppercase tracking-wider text-stone-400">Related Products</h3>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6" id="related-products-container"></div>
      </section>
    </div>

  </main>

  <!-- Footer Shell Container -->
  <div id="adepa-footer-container"></div>

  <!-- Chatbot Shell Container -->
  <div id="adepa-chatbot-container"></div>

  <!-- Shared Application Scripts -->
  <script src="js/app.js"></script>
  <script src="js/ai-helper.js"></script>

  <!-- Product Details Logic -->
  <script>
    let currentProduct = null;
    let selectedQuantity = 1;
    let activeReviews = [];

    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get("id");
      
      const liveProducts = getLiveProducts();
      currentProduct = liveProducts.find(p => p.id === productId);

      if (!currentProduct) {
        document.getElementById("product-not-found").classList.remove("hidden");
        return;
      }

      document.getElementById("product-details-container").classList.remove("hidden");
      activeReviews = currentProduct.reviews || [];

      // Render product basic info
      renderProductInfo();
      renderReviews();
      renderRelatedProducts(liveProducts);
      setupQuantityTriggers();

      // Form submission
      document.getElementById("add-review-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const nameInput = document.getElementById("rev-name-input");
        const ratingInput = document.getElementById("rev-rating-input");
        const commentInput = document.getElementById("rev-comment-input");

        const name = nameInput.value.trim();
        const comment = commentInput.value.trim();
        const rating = Number(ratingInput.value);

        if (!name || !comment) return;

        const newReview = {
          id: "rev-new-" + Math.random(),
          userName: name,
          comment: comment,
          rating: rating,
          date: new Date().toISOString().split("T")[0]
        };

        // Add review locally and update localStorage
        activeReviews.unshift(newReview);
        updateLiveProductReviews(currentProduct.id, newReview);

        // Reset
        nameInput.value = "";
        commentInput.value = "";
        ratingInput.value = "5";

        // Re-render
        renderReviews();
        renderProductInfo(); // Update stars count
      });

      // Add to Cart
      document.getElementById("add-to-cart-btn").addEventListener("click", () => {
        CartManager.addToCart(currentProduct, selectedQuantity);
      });
    });

    function renderProductInfo() {
      document.getElementById("prod-img").src = currentProduct.image;
      document.getElementById("prod-img").alt = currentProduct.name;
      
      const badge = document.getElementById("prod-badge");
      if (currentProduct.badge) {
        badge.classList.remove("hidden");
        badge.textContent = currentProduct.badge;
        // set badge colors
        badge.className = `absolute top-4 left-4 text-[9px] font-black uppercase tracking-wider px-2 py-0.5 rounded text-white shadow ${
          currentProduct.badge === "Sale" ? "bg-terracotta" : currentProduct.badge === "New" ? "bg-stone-charcoal" : "bg-kente-gold"
        }`;
      } else {
        badge.classList.add("hidden");
      }

      document.getElementById("prod-category").textContent = currentProduct.category;
      document.getElementById("prod-vendor").textContent = `by ${currentProduct.vendor}`;
      document.getElementById("prod-name").textContent = currentProduct.name;
      document.getElementById("prod-desc").textContent = currentProduct.description;

      // Price rendering
      const displayPrice = currentProduct.promoPrice ?? currentProduct.price;
      const hasPromo = !!currentProduct.promoPrice;
      document.getElementById("prod-price-display").textContent = `GHS ${displayPrice.toFixed(2)}`;
      
      const promoDisplay = document.getElementById("prod-promo-display");
      if (hasPromo) {
        promoDisplay.classList.remove("hidden");
        promoDisplay.textContent = `GHS ${currentProduct.price.toFixed(2)}`;
      } else {
        promoDisplay.classList.add("hidden");
      }

      // Review star rating summary calculation
      const avgRating = activeReviews.length > 0 
        ? Math.round(activeReviews.reduce((acc, r) => acc + r.rating, 0) / activeReviews.length) 
        : 5;

      const starsContainer = document.getElementById("prod-stars-container");
      starsContainer.innerHTML = "";
      for (let i = 0; i < 5; i++) {
        const star = document.createElement("svg");
        star.className = `h-3.5 w-3.5 ${i < avgRating ? "fill-current" : "text-stone-200"}`;
        star.setAttribute("viewBox", "0 0 20 20");
        star.setAttribute("fill", "currentColor");
        star.innerHTML = `<path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />`;
        starsContainer.appendChild(star);
      }
      document.getElementById("prod-reviews-count").textContent = `(${activeReviews.length} reviews)`;
    }

    function setupQuantityTriggers() {
      const qtyVal = document.getElementById("qty-value");
      document.getElementById("qty-minus").addEventListener("click", () => {
        selectedQuantity = Math.max(1, selectedQuantity - 1);
        qtyVal.textContent = selectedQuantity;
      });
      document.getElementById("qty-plus").addEventListener("click", () => {
        selectedQuantity += 1;
        qtyVal.textContent = selectedQuantity;
      });
    }

    function renderReviews() {
      const reviewsList = document.getElementById("reviews-list-container");
      reviewsList.innerHTML = "";

      if (activeReviews.length === 0) {
        reviewsList.innerHTML = `<div class="text-center py-8 text-stone-400 text-xs">No reviews listed. Be the first to add one!</div>`;
        return;
      }

      activeReviews.forEach(rev => {
        const revDiv = document.createElement("div");
        revDiv.className = "border-b border-stone-100 pb-4 last:border-0 last:pb-0";

        // Generate stars
        let starsHtml = "";
        for (let i = 0; i < 5; i++) {
          starsHtml += `
            <svg class="h-2.5 w-2.5 ${i < rev.rating ? "fill-current text-amber-500" : "text-stone-100"}" viewBox="0 0 20 20" fill="currentColor">
              <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
            </svg>
          `;
        }

        revDiv.innerHTML = `
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <div class="bg-stone-100 p-2 rounded-full text-stone-600">
                <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
              </div>
              <div>
                <h5 class="text-xs font-bold text-stone-850">${rev.userName}</h5>
                <div class="flex mt-0.5">
                  ${starsHtml}
                </div>
              </div>
            </div>
            <div class="flex items-center gap-1 text-[9px] text-stone-400 font-semibold">
              <svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <span>${rev.date}</span>
            </div>
          </div>
          <p class="text-stone-600 text-xs mt-2 pl-9 leading-relaxed">${rev.comment}</p>
        `;
        reviewsList.appendChild(revDiv);
      });
    }

    function renderRelatedProducts(allProducts) {
      const recsContainer = document.getElementById("related-products-container");
      recsContainer.innerHTML = "";

      const related = allProducts.filter(p => p.id !== currentProduct.id && p.category === currentProduct.category).slice(0, 3);
      if (related.length < 3) {
        const others = allProducts.filter(p => p.id !== currentProduct.id && !related.some(r => r.id === p.id)).slice(0, 3 - related.length);
        related.push(...others);
      }

      related.forEach(p => {
        const pPrice = p.promoPrice ?? p.price;
        const hasPromo = !!p.promoPrice;

        const card = document.createElement("div");
        card.className = "bg-white rounded-xl overflow-hidden border border-warm-border hover:shadow-md transition-all flex flex-col group";
        
        card.innerHTML = `
          <div class="relative h-40 w-full bg-stone-50">
            <img src="${p.image}" alt="${p.name}" class="absolute inset-0 w-full h-full object-cover" />
            <a href="product.html?id=${p.id}" class="absolute inset-0 flex items-center justify-center bg-stone-charcoal/20 opacity-0 group-hover:opacity-100 transition-opacity">
              <span class="bg-white text-stone-900 px-3.5 py-1.5 rounded font-bold text-[10px] shadow">
                View Product
              </span>
            </a>
          </div>

          <div class="p-4 flex-1 flex flex-col justify-between space-y-2">
            <div>
              <span class="text-[9px] text-stone-400 font-bold uppercase tracking-wide block">${p.category}</span>
              <h4 class="font-display font-bold text-xs text-stone-850 mt-0.5 truncate">
                <a href="product.html?id=${p.id}" class="hover:text-terracotta">${p.name}</a>
              </h4>
            </div>

            <div class="pt-2 border-t border-stone-50 flex justify-between items-center">
              <div class="flex flex-col">
                ${hasPromo ? `<span class="text-[9px] text-stone-400 line-through">GHS ${p.price.toFixed(2)}</span>` : ""}
                <span class="font-display font-bold text-xs text-stone-900">GHS ${pPrice.toFixed(2)}</span>
              </div>
              <button
                class="add-related-btn text-terracotta border border-terracotta/20 hover:bg-terracotta hover:text-white px-3 py-1 rounded text-[10px] font-bold transition-all"
              >
                + Add
              </button>
            </div>
          </div>
        `;

        card.querySelector(".add-related-btn").addEventListener("click", () => {
          CartManager.addToCart(p, 1);
        });

        recsContainer.appendChild(card);
      });
    }
  </script>
</body>
</html>
